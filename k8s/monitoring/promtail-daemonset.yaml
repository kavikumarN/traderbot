# One promtail pod per node (DaemonSet — can't just be a Deployment like
# the other monitoring components, since each instance must only read its
# own node's /var/log/pods). The RBAC below isn't actually exercised by
# the current config (config/promtail-config.yml uses a static file glob,
# not kubernetes_sd_configs — see that file's own comment for why), kept
# in place in case a future switch to API-based discovery on a different
# cluster needs it; harmless unused permissions in the meantime.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: monitoring
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      containers:
        - name: promtail
          image: grafana/promtail:3.2.1
          args:
            - "-config.file=/etc/promtail/promtail-config.yml"
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: pods-logs
              mountPath: /var/log/pods
              readOnly: true
            # /var/log/pods/**/*.log is a symlink into here on Docker-runtime
            # nodes (confirmed on Minikube's docker driver) — without this
            # mount those symlinks dangle and promtail ships nothing, no
            # error either, since a broken symlink just never matches
            # __path__. containerd-runtime nodes don't need this (their
            # /var/log/pods entries aren't symlinks), but mounting it
            # unconditionally is harmless either way.
            - name: docker-containers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: positions
              mountPath: /run/promtail
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: pods-logs
          hostPath:
            path: /var/log/pods
        - name: docker-containers
          hostPath:
            path: /var/lib/docker/containers
        - name: positions
          emptyDir: {}
