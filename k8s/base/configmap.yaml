# Every non-secret field from backend/app/core/config.py's Settings class.
# DATABASE_URL/REDIS_URL/JWT_SECRET_KEY/BINANCE_API_KEY/BINANCE_API_SECRET
# live in the Secret instead (see secret.example.yaml) since they embed
# credentials.
#
# list[str] fields (CORS_ORIGINS, MARKET_DATA_SYMBOLS,
# MARKET_DATA_CANDLE_INTERVALS) MUST use JSON-array syntax here, not the
# comma-separated form backend/.env.example shows — pydantic-settings
# tries to JSON-decode a real OS environment variable for any complex
# (list/dict) field before Settings' own comma-splitting field_validator
# ever runs, and a bare "BTCUSDT,ETHUSDT" isn't valid JSON. That
# comma-separated convenience form only works when Settings loads a
# `.env` file directly (a different pydantic-settings source), which is
# what happens for local dev but not here — confirmed the hard way via a
# CrashLoopBackOff on the migrate initContainer.

apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: traderbot
data:
  APP_NAME: "traderbot-backend"
  ENVIRONMENT: "production"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  API_V1_PREFIX: "/api/v1"
  CORS_ORIGINS: '["http://traderbot.local"]'
  DATABASE_POOL_SIZE: "10"
  DATABASE_MAX_OVERFLOW: "5"
  DATABASE_ECHO: "false"
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "15"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  PASSWORD_MIN_LENGTH: "10"
  BINANCE_REST_BASE_URL: "https://api.binance.com"
  BINANCE_WS_BASE_URL: "wss://stream.binance.com:9443"
  BINANCE_RECV_WINDOW_MS: "5000"
  BINANCE_REQUEST_WEIGHT_LIMIT: "6000"
  BINANCE_REQUEST_WEIGHT_WINDOW_SECONDS: "60.0"
  BINANCE_ORDER_LIMIT: "100"
  BINANCE_ORDER_WINDOW_SECONDS: "10.0"
  BINANCE_MAX_RETRIES: "3"
  BINANCE_RETRY_BASE_DELAY_SECONDS: "0.5"
  MARKET_DATA_SYMBOLS: '["BTCUSDT","ETHUSDT"]'
  MARKET_DATA_CANDLE_INTERVALS: '["1m"]'
  MARKET_DATA_ORDER_BOOK_PERSIST_INTERVAL_SECONDS: "1.0"
  TRADING_MODE: "paper"
  PAPER_TRADING_STARTING_BALANCE_USDT: "100000"
  PAPER_TRADING_COMMISSION_RATE: "0.001"
