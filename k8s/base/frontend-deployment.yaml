# Purely stateless (static assets + a reverse proxy), unlike the backend —
# safe to run multiple replicas of.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: traderbot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: traderbot-frontend:local
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: traderbot
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
