# TEMPLATE ONLY — never applied as-is, and deliberately NOT listed in
# kustomization.yaml's resources (so `kubectl apply -k` can't accidentally
# apply these placeholder values). Copy this file, fill in real values, and
# either `kubectl apply -f` the copy directly or (preferred — keeps secrets
# out of any file at all) run:
#
#   kubectl create secret generic backend-secrets -n traderbot \
#     --from-literal=JWT_SECRET_KEY=... \
#     --from-literal=DATABASE_URL=postgresql+asyncpg://traderbot:<password>@postgres:5432/traderbot \
#     --from-literal=REDIS_URL=redis://redis:6379/0 \
#     --from-literal=POSTGRES_PASSWORD=<password> \
#     --from-literal=BINANCE_API_KEY=... \
#     --from-literal=BINANCE_API_SECRET=...
#
# See `make k8s-secrets` (Makefile), which runs the equivalent generated
# from backend/.env.
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: traderbot
type: Opaque
stringData:
  JWT_SECRET_KEY: "REPLACE_ME_a_long_random_secret_min_32_chars"
  DATABASE_URL: "postgresql+asyncpg://traderbot:REPLACE_ME@postgres:5432/traderbot"
  REDIS_URL: "redis://redis:6379/0"
  POSTGRES_PASSWORD: "REPLACE_ME"
  BINANCE_API_KEY: ""
  BINANCE_API_SECRET: ""
