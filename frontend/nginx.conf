# Serves the built SPA and reverse-proxies API/health traffic to the
# backend, under one origin — the frontend never talks cross-origin to the
# backend in Compose/K8s (only VITE_API_BASE_URL in a bare local dev setup
# does). "backend" resolves via Docker Compose service DNS or the
# Kubernetes Service of the same name (see k8s/base/backend-deployment.yaml).

server {
    listen 80;
    # Without this, "localhost" inside the container can resolve to ::1
    # before 127.0.0.1 and the HEALTHCHECK below (curl/wget localhost:80)
    # gets connection-refused even though nginx is up and IPv4 works fine
    # from outside — the base image's own default.conf sets this up via an
    # entrypoint script, but that script skips any conf.d file it doesn't
    # recognize, which is this one.
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # nginx's own liveness endpoint — distinct from the backend's
    # /health/live proxied below, so a Docker/K8s probe against this
    # container never depends on the backend being reachable.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Static assets Vite fingerprints — safe to cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: any route react-router owns client-side still needs to
    # resolve to index.html rather than a bare nginx 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
