# Optional add-on: `docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up`
# (or with docker-compose.prod.yml instead of the dev file). Deliberately
# has no `name:`/`networks:` of its own so it joins whichever base file's
# default network it's composed with — that's how `prometheus` resolves
# `backend:8000` and `promtail` resolves the container logs to ship.
#
# Not applied by default: most iterations on the app itself don't need a
# running Grafana, and both docker-compose.yml and docker-compose.prod.yml
# work fine without this file.

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.1
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      # A single mount, not two: a second bind mounted under this one's
      # target path can't create its own mountpoint once the parent is
      # already a read-only bind mount (Docker error: "read-only file
      # system" trying to mkdir it). The dashboard JSON lives at
      # deploy/grafana/provisioning/dashboards/json/ precisely so one
      # mount covers datasources + the dashboard provider + the dashboard
      # itself.
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  loki:
    image: grafana/loki:3.2.1
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./deploy/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.2.1
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./deploy/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
